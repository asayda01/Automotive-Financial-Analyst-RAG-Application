version: '3.8'

services:
  rag-app:
    build: .
    container_name: automotive-rag
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./src:/app/src  # Hot reload for development
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s